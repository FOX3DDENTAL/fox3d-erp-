<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FOX3D Dental — ERP Production</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:#eef0f6;color:#1a1a2e;height:100vh;display:flex;overflow:hidden}
a{color:inherit;text-decoration:none}

/* SIDEBAR */
#sidebar{width:220px;flex-shrink:0;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 55%,#0f3460 100%);display:flex;flex-direction:column;overflow-y:auto}
.logo{padding:16px 14px 12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo-title{font-size:14px;font-weight:700;color:#fff}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:.5px;margin-top:2px}
.nav-group{padding:10px 8px 4px}
.nav-label{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;text-transform:uppercase;padding:0 6px;margin-bottom:4px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.55);font-weight:500;transition:all .2s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.nav-btn.active{background:rgba(233,69,96,0.2);color:#fff;border-left:3px solid #e94560}
.nav-ico{font-size:13px;width:16px;text-align:center}
.nav-badge{margin-left:auto;background:#e94560;color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}
.sidebar-footer{margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,0.1);font-size:10px;color:rgba(255,255,255,0.35)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:54px;background:#fff;border-bottom:3px solid #e94560;display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;box-shadow:0 2px 12px rgba(233,69,96,0.07)}
#page-title{font-size:15px;font-weight:600;flex:1}
.search-wrap{display:flex;align-items:center;background:#f2f2f7;border-radius:8px;padding:5px 10px;gap:6px;width:220px}
.search-wrap input{border:none;background:none;outline:none;font-size:12px;color:#1d1d1f;width:100%}
.search-wrap input::placeholder{color:#aeaeb2}
.btn{padding:6px 12px;border-radius:7px;border:1px solid #d1d1d6;background:#fff;color:#1d1d1f;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .1s;white-space:nowrap}
.btn:hover{background:#f2f2f7}
.btn-blue{background:linear-gradient(135deg,#1a56db,#0f3460);color:#fff;border:none;box-shadow:0 2px 8px rgba(26,86,219,0.25)}
.btn-blue:hover{background:#1e40af}
.btn-sm{padding:3px 8px;font-size:11px}
.btn-red{color:#dc2626;border-color:#fecaca}
.btn-red:hover{background:#fee2e2}

#content{flex:1;overflow-y:auto;padding:16px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:none;border-radius:14px;padding:14px 16px;box-shadow:0 2px 14px rgba(26,26,46,0.07);transition:transform .15s}
.kpi-l{font-size:10px;color:#8892a4;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.kpi-v{font-size:26px;font-weight:700;letter-spacing:-1px}
.kpi-s{font-size:10px;color:#aeaeb2;margin-top:3px}

/* CARD */
.card{background:#fff;border:none;border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 16px rgba(26,26,46,0.08)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid #f0f2f8;flex-wrap:wrap;gap:6px;background:#fafbfc}
.card-title{font-size:13px;font-weight:700;color:#1a1a2e}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
select{background:#fff;border:1px solid #d1d1d6;border-radius:7px;color:#1d1d1f;font-size:12px;font-family:inherit;padding:5px 8px;cursor:pointer;outline:none}
select:focus{border-color:#1a56db}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 10px;text-align:left;color:#8892a4;font-size:10px;font-weight:700;border-bottom:2px solid #f0f2f8;white-space:nowrap;background:#fafbfc;position:sticky;top:0;z-index:1;text-transform:uppercase;letter-spacing:.5px}
td{padding:7px 8px;border-bottom:1px solid #f2f2f7;vertical-align:middle;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f5f7ff}
td.mono{font-family:monospace;font-size:11px;color:#8e8e93}

/* BADGES */
.b{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:600;white-space:nowrap}
.bg{background:#dcfce7;color:#166534}
.ba{background:#fef9c3;color:#854d0e}
.br{background:#fee2e2;color:#991b1b}
.bb{background:#dbeafe;color:#1e40af}
.bp{background:#ede9fe;color:#5b21b6}
.bt{background:#ccfbf1;color:#134e4a}
.bk{background:#f3f4f6;color:#374151}

/* STEPS */
.steps{display:flex;gap:3px}
.st{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.st-ok{background:#dcfce7;color:#166534}
.st-wip{background:#fef9c3;color:#854d0e}
.st-no{background:#f3f4f6;color:#9ca3af}

/* OP */
.op{width:22px;height:22px;border-radius:50%;background:#dbeafe;color:#1e40af;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}

/* PAGER */
.pager{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid #f2f2f7;font-size:12px;color:#8e8e93}

/* MODAL OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:0;width:90%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{padding:16px 18px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.modal-head h3{font-size:14px;font-weight:700;color:#fff}
.modal-body{padding:16px 18px}
.modal-foot{padding:12px 18px;border-top:1px solid #e5e5e5;display:flex;gap:8px;justify-content:flex-end}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:10px;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1px solid #d1d1d6;border-radius:7px;font-family:inherit;font-size:13px;color:#1d1d1f;outline:none;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.fg textarea{resize:vertical;min-height:60px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* BAR CHART */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px}
.bl{width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;color:#3a3a3c}
.bw{flex:1;height:7px;background:#f2f2f7;border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;background:#1a56db;transition:width .3s}
.bc{min-width:30px;text-align:right;font-size:11px;color:#8e8e93}

/* CMD CARD */
.cmd-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.cmd-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.cmd-num{font-size:11px;color:#1a56db;font-family:monospace;font-weight:600}
.cmd-name{font-size:13px;font-weight:600}
.cmd-sub{font-size:11px;color:#8e8e93;margin-top:2px}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:#1d1d1f;color:#fff;padding:10px 16px;border-radius:10px;font-size:12px;z-index:9999;display:none;max-width:280px}

/* DETAIL PANEL */
#detail{position:fixed;right:0;top:0;bottom:0;width:380px;background:#fff;border-left:1px solid #e5e5e5;z-index:500;transform:translateX(100%);transition:transform .25s;overflow-y:auto;display:flex;flex-direction:column}
#detail.open{transform:translateX(0)}
.det-head{padding:14px 16px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.det-body{padding:14px 16px;flex:1}
.det-sec{margin-bottom:16px}
.det-sec-title{font-size:10px;color:#aeaeb2;text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:8px}
.det-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f2f2f7;font-size:12px}
.det-row:last-child{border:none}
.det-key{color:#8e8e93}
.det-val{font-weight:500;text-align:right;max-width:200px;word-break:break-word}
.progress-flow{display:flex;align-items:center;gap:4px;margin:10px 0}
.pf-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.pf-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.pf-label{font-size:9px;color:#aeaeb2;text-align:center}
.pf-line{height:2px;flex:1;background:#e5e5e5;margin-top:13px}
.pf-line.done{background:#22c55e}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:3px}
</style>
</head>

var lastSync = null;
var syncStatus = 'idle'; // idle | loading | ok | error

function syncFromSheet() {
  syncStatus = 'loading';
  updateSyncUI();
  var corsUrl='https://corsproxy.io/?'+encodeURIComponent(SYNC_URL);
  fetch(corsUrl)
    .then(function(r){ return r.json(); })
    .then(function(json){
      if(!json.ok) throw new Error('Erreur script');
      production = json.data.map(function(r,i){
        return {
          id: i,
          date:r[0], num:r[1], type:r[2], teinte:r[3],
          fichier:r[4], dl_le:r[5], modeles:r[6], rs:r[7],
          chassis:r[8], dents_pmma:r[9], dents_temp:r[10], dents_perm:r[11],
          base_rose:r[12], etat_cad:r[13], sorti_prod:r[14], operateur:r[15],
          feuille:r[16], date_depart:r[17], commentaires:r[18],
          asm_num:r[19], asm_type:r[20], assemblage:r[21], grattage:r[22],
          polissage:r[23], asm_status:r[24]||''
        };
      });
      localStorage.setItem('fox3d_prod', JSON.stringify(production));
      lastSync = new Date();
      syncStatus = 'ok';
      updateSyncUI();
      toast('\u2713 ' + production.length + ' pièces synchronisées depuis Google Sheet');
      render();
    })
    .catch(function(e){
      syncStatus = 'error';
      updateSyncUI();
      toast('Erreur sync : ' + e.message, true);
    });
}

function updateSyncUI() {
  var el = document.getElementById('sync-btn');
  var el2 = document.getElementById('sync-info');
  if(!el) return;
  if(syncStatus==='loading'){ el.textContent='\u27F3 Sync...'; el.disabled=true; }
  else if(syncStatus==='ok'){ el.textContent='\u27F3 Sync Google Sheet'; el.disabled=false; }
  else if(syncStatus==='error'){ el.textContent='\u26A0 Réessayer sync'; el.disabled=false; }
  else { el.textContent='\u27F3 Sync Google Sheet'; el.disabled=false; }
  if(el2 && lastSync) el2.textContent = 'Dernière sync : ' + lastSync.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

  production=DATA.map(function(r,i){

  });

function save(){
  localStorage.setItem('fox3d_prod',JSON.stringify(production));
  localStorage.setItem('fox3d_cmds',JSON.stringify(commandes));
  document.getElementById('save-info').textContent='Sauvegardé '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

function toast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  t.style.background=err?'#dc2626':'#1d1d1f';
  clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none'},2800);
}

function st(p){
  var s=p.asm_status||'';
  if(s==='TERMINER')return 'TERMINER';
  if(s==='ANNULER')return 'ANNULER';
  if(s==='A REFAIRE')return 'A REFAIRE';
  if(s==='EN COURS')return 'EN COURS';
  if((p.etat_cad||'').toLowerCase().includes('cours'))return 'EN COURS';
  if((p.fichier||'').toLowerCase().includes('segment')||!p.fichier)return 'PLANIFIE';
  return 'PLANIFIE';
}

function sb(s){
  var m={TERMINER:['bg','Terminé'],EN_COURS:['ba','En cours'],PLANIFIE:['bb','Planifié'],ANNULER:['bk','Annulé'],'A REFAIRE':['br','À refaire']};
  var k=s==='EN COURS'?'EN_COURS':s;
  var v=m[k]||['bk',s];
  return '<span class="b '+v[0]+'">'+v[1]+'</span>';
}

function cbg(s){
  var m={recu:['bb','Reçue'],'en-cours':['ba','En production'],pret:['bt','Prêt'],livre:['bg','Livré']};
  var v=m[s]||['bk',s];return '<span class="b '+v[0]+'">'+v[1]+'</span>';
}

function pb(s){
  var m={normale:['bk','Normale'],urgente:['ba','\u26A1 Urgente'],'tres-urgente':['br','\u1F534 Très urgente']};
  var v=m[s]||['bk',s];return '<span class="b '+v[0]+'">'+v[1]+'</span>';
}

function sd(v,lbl){
  var c='st-no',t='\u2014';
  if(!v||!v.trim()){c='st-no';t='\u2014';}
  else if(['Produits','Produit','TERMINER'].some(function(x){return v.includes(x)})){c='st-ok';t='\u2713';}
  else if(['cours','design','HAAS','production','Designé'].some(function(x){return v.toLowerCase().includes(x.toLowerCase())})){c='st-wip';t='\u2026';}
  return '<span class="st '+c+'" title="'+(lbl||'')+'">'+t+'</span>';
}

function dfmt(s){
  if(!s)return '';
  var p=s.split('/');
  if(p.length===3)return p[2]+'-'+p[1]+'-'+p[0];
  return s;
}
function dfmtback(s){
  if(!s)return '';
  var p=s.split('-');
  if(p.length===3)return p[2]+'/'+p[1]+'/'+p[0];
  return s;
}

/* ===== NAV ===== */
function go(page){
  CURRENT_PAGE=page;
  var titles={dashboard:'Tableau de bord',production:'Suivi de production',assemblage:'Assemblage & finition',commandes:'Commandes clients',stats:'Statistiques',operateurs:'Opérateurs',planning:'Planning semaine'};
  document.getElementById('page-title').textContent=titles[page]||page;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active')});
  var idx={dashboard:0,production:1,assemblage:2,commandes:3,stats:5,operateurs:6,planning:7};
  var btns=document.querySelectorAll('.nav-btn');
  if(btns[idx[page]])btns[idx[page]].classList.add('active');
  filtered=production.slice();
  render();
  closeDetail();
  document.getElementById('cmd-badge').textContent=commandes.length;
}

function applyFilters(){
  var q=(document.getElementById('gsearch').value||'').toLowerCase();
  var fs=(document.getElementById('f-status')?document.getElementById('f-status').value:'');
  var ft=(document.getElementById('f-type')?document.getElementById('f-type').value:'');
  var fo=(document.getElementById('f-op')?document.getElementById('f-op').value:'');
  var fm=(document.getElementById('f-machine')?document.getElementById('f-machine').value:'');
  var ftei=document.getElementById('f-tei')?document.getElementById('f-tei').value:'';
  filtered=production.filter(function(p){
    if(fs&&st(p)!==fs)return false;
    if(ft&&p.type!==ft)return false;
    if(fo&&p.operateur!==fo)return false;
    if(fm&&!(p.chassis||'').includes(fm))return false;
    if(ftei&&p.teinte!==ftei)return false;
    if(q&&!(p.num+p.type+p.teinte+p.commentaires+'').toLowerCase().includes(q))return false;
    return true;
  });
  renderTable();
}

function render(){
  var pages={dashboard:renderDash,production:renderProd,assemblage:renderAsm,commandes:renderCmds,stats:renderStats,operateurs:renderOps,planning:renderPlanning};
  (pages[CURRENT_PAGE]||renderDash)();
}

  '</div>'+

      '<div style="padding:10px 14px">'+(urgents.length===0?'<div style="color:#aeaeb2;font-size:12px;padding:4px 0">Aucune commande urgente</div>':urgents.map(function(c){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f2f2f7">'+

    '</div></div>'+

      '<thead><tr><th>N° CAD</th><th>Date</th><th>Type</th><th>Teinte</th><th>Modèles</th><th>Châssis</th><th>Dents</th><th>Base</th><th>CAD</th><th>Sortie</th><th>Op</th><th>Feuille</th><th>Départ</th><th>Asm</th><th>Grat</th><th>Pol</th><th>Statut</th><th>Commentaire</th><th></th></tr></thead>'+

  prod_page=Math.max(0,Math.ceil(filtered.length/PERPAGE)-1);
  renderTable();
}

function syncSearch(v){document.getElementById('gsearch').value=v;applyFilters();}

function renderTable(){
  var pages2=Math.ceil(filtered.length/PERPAGE)||1;
  if(prod_page>=pages2)prod_page=pages2-1;
  if(prod_page<0)prod_page=0;
  var s=prod_page*PERPAGE,e=Math.min(s+PERPAGE,filtered.length);
  var slice=filtered.slice(s,e);
  var pages=Math.ceil(filtered.length/PERPAGE)||1;
  document.getElementById('prod-body').innerHTML=slice.map(function(p){
    var status=st(p);
    var dents=p.dents_pmma||p.dents_temp||p.dents_perm||'';
    return '<tr onclick="openDetail('+p.id+')" style="cursor:pointer">'+
      '<td class="mono">'+p.num+'</td>'+
      '<td class="mono" style="font-size:11px">'+fmtDate(p.date)+'</td>'+
      '<td style="font-weight:500;max-width:130px">'+p.type+'</td>'+
      '<td>'+(p.teinte?'<span class="b bk">'+p.teinte+'</span>':'\u2014')+'</td>'+
      '<td>'+sd(p.modeles,'Modèles')+'</td>'+
      '<td style="font-size:11px;color:#8e8e93;max-width:80px">'+(p.chassis||'\u2014')+'</td>'+
      '<td>'+sd(dents,'Dents')+'</td>'+
      '<td>'+sd(p.base_rose,'Base rose')+'</td>'+
      '<td>'+(p.etat_cad==='\u2713'?'<span class="b bg">\u2713</span>':p.etat_cad&&p.etat_cad.toLowerCase().includes('cours')?'<span class="b ba">\u2026</span>':'<span class="b bk">\u2014</span>')+'</td>'+
      '<td class="mono" style="font-size:11px">'+fmtDate(p.sorti_prod)+'</td>'+
      '<td><span class="op">'+(p.operateur||'?')+'</span></td>'+
      '<td>'+(p.feuille==='OUI'?'<span class="b bg">OUI</span>':'<span class="b br">NON</span>')+'</td>'+
      '<td class="mono" style="font-size:11px">'+fmtDate(p.date_depart)+'</td>'+
      '<td>'+sd(p.assemblage,'Assemblage')+'</td>'+
      '<td>'+sd(p.grattage,'Grattage')+'</td>'+
      '<td>'+sd(p.polissage,'Polissage')+'</td>'+
      '<td>'+sb(status)+'</td>'+
      '<td style="max-width:100px;color:#8e8e93;font-size:11px" title="'+(p.commentaires||'')+'">'+(p.commentaires||'').substring(0,25)+(p.commentaires&&p.commentaires.length>25?'\u2026':'')+'</td>'+
      '<td onclick="event.stopPropagation()"><button class="btn btn-sm" onclick="openEditPiece('+p.id+')">\u270E</button></td>'+
    '</tr>';
  }).join('');
  document.getElementById('pager-txt').textContent='Page '+(prod_page+1)+' / '+pages;
  document.getElementById('pager-tot').textContent=filtered.length+' pièces';
  document.getElementById('btn-prev').disabled=prod_page===0;
  document.getElementById('btn-next').disabled=prod_page>=pages-1;
}

function prodPage(d){prod_page+=d;renderTable();}

  var done=production.filter(function(p){return p.asm_status==='TERMINER'}).slice(-20).reverse();

  document.getElementById('content').innerHTML=
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">'+

      return '<tr><td class="mono">'+p.num+'</td><td>'+p.type+'</td><td>'+sd(p.assemblage)+'</td><td>'+sd(p.grattage)+'</td><td>'+sd(p.polissage)+'</td>'+
        '<td><button class="btn btn-sm btn-blue" onclick="markDone('+p.id+')">Terminer \u2713</button></td></tr>';
    }).join('')+'</tbody></table></div></div>'+

        '<td><span class="op">'+(p.operateur||'?')+'</span></td></tr>';

function markDone(id){
  var p=production.find(function(x){return x.id===id});
  if(!p)return;
  p.asm_status='TERMINER';p.assemblage='Produits';p.grattage='Produits';p.polissage='Produits';
  save();toast('Pièce terminée \u2713');render();
}
function markInProgress(id){
  var p=production.find(function(x){return x.id===id});
  if(!p)return;
  p.asm_status='EN COURS';
  save();toast('Lancé en assemblage');render();
}

      '</div>';
    }).join('')+'</div>'+
    '<div class="card"><div class="card-head"><div class="card-title">Détail par opérateur</div></div>'+
    '<div class="tw"><table><thead><tr><th>Opérateur</th><th>Pièces</th><th>Terminées</th><th>En cours</th><th>Taux</th><th>Types principaux</th></tr></thead><tbody>'+
    stats.map(function(o){
      var byType={};
      production.filter(function(p){return p.operateur===o.op}).forEach(function(p){byType[p.type]=(byType[p.type]||0)+1;});
      var top=Object.entries(byType).sort(function(a,b){return b[1]-a[1]}).slice(0,3);
      return '<tr>'+
        '<td><span class="op">'+o.op+'</span> <span style="margin-left:6px;font-weight:500">'+o.name+'</span></td>'+

      '</tr>';
    }).join('')+'</tbody></table></div></div>';
}

/* ===== PLANNING ===== */
function renderPlanning(){
  var today=new Date();
  var days=[];
  for(var i=0;i<7;i++){var d=new Date(today);d.setDate(today.getDate()+i);days.push(d);}
  function fd(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
  function ftod(){return fd(today);}

  var upcom=production.filter(function(p){
    if(!p.date_depart)return false;
    var ps=p.date_depart.split('/');
    if(ps.length!==3)return false;
    var pd=new Date(parseInt(ps[2]),parseInt(ps[1])-1,parseInt(ps[0]));
    return pd>=today&&pd<=days[6];
  });

  document.getElementById('content').innerHTML=
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">'+
    days.map(function(d){
      var ds=fd(d);
      var isToday=ds===ftod();
      var items=upcom.filter(function(p){return p.date_depart===ds});
      var dn=d.toLocaleDateString('fr-FR',{weekday:'short'});
      return '<div class="card" style="'+(isToday?'border-color:#1a56db;':'')+' min-height:120px">'+
        '<div style="padding:8px;text-align:center;border-bottom:1px solid #f2f2f7">'+
          '<div style="font-size:10px;color:#aeaeb2;text-transform:uppercase">'+dn+'</div>'+
          '<div style="font-size:20px;font-weight:700;'+(isToday?'color:#1a56db':'')+'">'+d.getDate()+'</div>'+
          (items.length?'<div style="font-size:10px;color:#d97706;font-weight:600">'+items.length+' pcs</div>':'')+
        '</div>'+
        '<div style="padding:6px">'+
        items.slice(0,4).map(function(p){
          return '<div onclick="openDetail('+p.id+')" style="background:#f2f2f7;border-radius:5px;padding:4px 6px;margin-bottom:3px;font-size:10px;cursor:pointer">'+
            '<div style="color:#aeaeb2;font-family:monospace">'+p.num+'</div>'+
            '<div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.type+'</div>'+
            '<span class="op" style="width:16px;height:16px;font-size:9px">'+p.operateur+'</span>'+
          '</div>';
        }).join('')+
        (items.length>4?'<div style="font-size:10px;color:#aeaeb2;text-align:center">+'+( items.length-4)+' autres</div>':'')+
        '</div></div>';
    }).join('')+'</div>'+
    '<div style="text-align:center;color:#aeaeb2;font-size:11px;margin-top:10px">'+upcom.length+' pièces prévues cette semaine</div>';
}

    flowHtml+
    '<div class="det-sec"><div class="det-sec-title">Toutes les informations</div>'+
    rows.map(function(r){return '<div class="det-row"><div class="det-key">'+r[0]+'</div><div class="det-val">'+r[1]+'</div></div>';}).join('')+
    '</div>'+
    (p.commentaires?'<div class="det-sec"><div class="det-sec-title">Commentaires</div><div style="background:#f2f2f7;border-radius:8px;padding:10px;font-size:12px;color:#3a3a3c">'+p.commentaires+'</div></div>':'')+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">'+
      '<button class="btn btn-blue" onclick="openEditPiece('+p.id+')">\u270E Modifier</button>'+
      (s!=='TERMINER'?'<button class="btn" onclick="markDone('+p.id+');closeDetail()">\u2713 Marquer terminé</button>':'')+
      '<button class="btn btn-red" onclick="delPiece('+p.id+')">\u2715 Supprimer</button>'+
    '</div>';

  document.getElementById('detail').classList.add('open');
}

function closeDetail(){document.getElementById('detail').classList.remove('open');}

function savePiece(){
  var num=document.getElementById('p-num').value.trim();
  var type=document.getElementById('p-type').value;
  if(!num){toast('N° CAD obligatoire',true);return;}
  if(!type){toast('Type obligatoire',true);return;}
  var obj={
    num:num,type:type,
    date:dfmtback(document.getElementById('p-date').value),
    teinte:document.getElementById('p-teinte').value,
    operateur:document.getElementById('p-op').value,
    date_depart:dfmtback(document.getElementById('p-depart').value),
    dl_le:dfmtback(document.getElementById('p-dldate').value),
    fichier:document.getElementById('p-fichier').value,
    modeles:document.getElementById('p-modeles').value,
    chassis:document.getElementById('p-chassis').value,
    dents_pmma:document.getElementById('p-dents').value,
    dents_temp:document.getElementById('p-dtemp').value,
    dents_perm:document.getElementById('p-dperm').value,
    base_rose:document.getElementById('p-base').value,
    rs:document.getElementById('p-rs').value,
    etat_cad:document.getElementById('p-cad').value,
    sorti_prod:dfmtback(document.getElementById('p-sorti').value),
    feuille:document.getElementById('p-feuille').value,
    assemblage:document.getElementById('p-asm').value,
    grattage:document.getElementById('p-grat').value,
    polissage:document.getElementById('p-pol').value,
    asm_status:document.getElementById('p-astatus').value,
    commentaires:document.getElementById('p-comment').value,
    asm_num:num,asm_type:type
  };
  if(EDIT_ID!==null){
    var i=production.findIndex(function(x){return x.id===EDIT_ID});
    production[i]=Object.assign({},production[i],obj);
    toast('Pièce mise à jour \u2713');
  } else {
    obj.id=Date.now();
    production.push(obj);
    toast('Pièce ajoutée \u2713');
  }
  closeModal('piece');save();render();
}

function delPiece(id){
  if(!confirm('Supprimer cette pièce ?'))return;
  production=production.filter(function(x){return x.id!==id});
  save();closeDetail();toast('Pièce supprimée');render();
}

/* ===== EXPORT ===== */
function exportCSV(){
  var h=['Date','N CAD','Type','Teinte','Fichier','DL le','Modeles','RS','Chassis','Dents PMMA','Dents Temp','Dents Perm','Base Rose','Etat CAD','Sorti Prod','Operateur','Feuille','Date Depart','Commentaires','Assemblage','Grattage','Polissage','Statut'];
  var rows=production.map(function(p){
    return [p.date,p.num,p.type,p.teinte,p.fichier,p.dl_le,p.modeles,p.rs,p.chassis,p.dents_pmma,p.dents_temp,p.dents_perm,p.base_rose,p.etat_cad,p.sorti_prod,p.operateur,p.feuille,p.date_depart,p.commentaires,p.assemblage,p.grattage,p.polissage,p.asm_status].map(function(v){return '"'+(v||'').replace(/"/g,'""')+'"';}).join(',');
  });
  var csv='\uFEFF'+[h.join(',')].concat(rows).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='FOX3D_Production_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('Export CSV téléchargé !');
}

function fmtDate(s){
  if(!s||!s.trim()||s.trim()==='-')return '-';
  var p=s.trim().split('/');
  if(p.length===3)return p[0]+'.'+p[1]+'.'+p[2];
  return s;
}
